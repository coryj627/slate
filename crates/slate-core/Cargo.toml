[package]
name = "slate-core"
description = "Core engine for Slate, an accessibility-first knowledge workspace"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
pulldown-cmark = { workspace = true }
thiserror = { workspace = true }
rusqlite = { workspace = true }
blake3 = { workspace = true }
trash = { workspace = true }
tempfile = { workspace = true }
yaml-rust2 = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
proptest = { workspace = true }

# Used only by the Unix-only `rescan_with_mtime_preserved_but_ctime_changed_rehashes`
# test, which calls utimensat(2) directly to simulate an mtime-
# preserving writer. Listing it as a Unix-target dev-dep keeps it
# off the Windows build entirely.
[target.'cfg(unix)'.dev-dependencies]
libc = "0.2"

[[bench]]
name = "scan_bench"
harness = false
