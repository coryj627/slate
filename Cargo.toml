[workspace]
resolver = "2"
members = [
    "crates/yana-core",
    "crates/yana-uniffi",
]

[workspace.package]
version = "0.0.1"
edition = "2021"
license = "MIT"
authors = ["Cory Joseph <cj@startingblind.com>"]
repository = "https://github.com/coryj627/YANA"
rust-version = "1.75"

[workspace.dependencies]
pulldown-cmark = { version = "0.10", default-features = false }
thiserror = "1"
uniffi = { version = "0.28", features = ["cli"] }
rusqlite = { version = "0.31", features = ["bundled"] }
tempfile = "3"
blake3 = "1"
trash = "5"

[profile.dev]
# Faster incremental builds during development.
opt-level = 0
debug = true

[profile.release]
opt-level = 3
lto = "thin"
strip = "symbols"
