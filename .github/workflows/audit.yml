# Supply-chain security gate: scans the resolved dependency graph for
# known RustSec advisories. Fails the build on *vulnerabilities*;
# unmaintained-crate warnings are reported but don't fail the gate.
#
# Cargo.lock isn't tracked in this repo (see .gitignore), so the lockfile
# is resolved fresh before auditing. Runs on a cheap Linux runner — the
# audit only inspects the dependency graph, which is platform-independent,
# so it doesn't need the macos-14 toolchain pin the build workflows use.

name: Security audit

on:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'crates/**/Cargo.toml'
      - '.github/workflows/audit.yml'
      # Re-run the gate when the ignore list changes, so a newly-added
      # advisory ignore is validated (and a removed one re-checked).
      - '.cargo/audit.toml'
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'crates/**/Cargo.toml'
      - '.github/workflows/audit.yml'
      # Re-run the gate when the ignore list changes, so a newly-added
      # advisory ignore is validated (and a removed one re-checked).
      - '.cargo/audit.toml'
  schedule:
    # Weekly, so a newly-disclosed advisory against an unchanged pinned
    # dependency is still caught without waiting for a manifest edit.
    - cron: '0 7 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Enforce advisory-ignore review-by date
        # An accepted-risk ignore in .cargo/audit.toml must be timeboxed,
        # not permanent (Codoki review on #481). When the file has active
        # ignores, fail once the `review-by:` date has passed so the ignore
        # is re-evaluated — removed if a fix shipped (see #480), or the date
        # bumped with fresh justification. Runs on the weekly cron too, so a
        # stale ignore surfaces even without a PR.
        run: |
          if [ ! -f .cargo/audit.toml ] || ! grep -qE '^[[:space:]]*"RUSTSEC-' .cargo/audit.toml; then
            echo "No active advisory ignores — timebox check skipped."
            exit 0
          fi
          review_by="$(grep -oE 'review-by:[[:space:]]*[0-9]{4}-[0-9]{2}-[0-9]{2}' .cargo/audit.toml | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1)"
          if [ -z "$review_by" ]; then
            echo "::error::.cargo/audit.toml has active ignores but no 'review-by:' date — every ignore must be timeboxed."
            exit 1
          fi
          today="$(date -u +%Y-%m-%d)"
          if [[ "$today" > "$review_by" ]]; then
            echo "::error::advisory-ignore review-by date ($review_by) has passed. Re-evaluate the ignores in .cargo/audit.toml (see #480): remove any now-fixable advisory, or bump review-by with justification."
            exit 1
          fi
          echo "Advisory ignores valid — review-by $review_by, today $today."

      - name: Install cargo-audit
        # Pin the scanner version (matching the repo's pin-everything
        # convention) for reproducible runs. The advisory database is
        # still fetched fresh on every run, so pinning the tool doesn't
        # reduce coverage — newly-disclosed advisories are still caught.
        # Bump deliberately.
        run: cargo install cargo-audit --locked --version 0.22.2

      - name: Resolve lockfile
        # Cargo.lock is not committed; generate it so the audit has a
        # concrete dependency graph to scan.
        run: cargo generate-lockfile

      - name: cargo audit
        # Non-zero exit on RustSec vulnerabilities fails the gate.
        # Unmaintained-crate warnings (e.g. transitive paste / yaml-rust)
        # are informational and do not fail the build.
        run: cargo audit
