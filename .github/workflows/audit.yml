# Supply-chain security gate: scans the resolved dependency graph for
# known RustSec advisories. Fails the build on *vulnerabilities*;
# unmaintained-crate warnings are reported but don't fail the gate.
#
# Cargo.lock is committed (CI Phase 3), so the audit scans the exact
# resolved graph the build uses. Runs on a Namespace Linux runner — the
# audit only inspects the dependency graph, which is platform-independent,
# so it doesn't need the macOS pin the Swift build uses.

name: Security audit

on:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'crates/**/Cargo.toml'
      - '.github/workflows/audit.yml'
      # Re-run the gate when the ignore list changes, so a newly-added
      # advisory ignore is validated (and a removed one re-checked).
      - '.cargo/audit.toml'
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'crates/**/Cargo.toml'
      - '.github/workflows/audit.yml'
      # Re-run the gate when the ignore list changes, so a newly-added
      # advisory ignore is validated (and a removed one re-checked).
      - '.cargo/audit.toml'
  schedule:
    # Weekly, so a newly-disclosed advisory against an unchanged pinned
    # dependency is still caught without waiting for a manifest edit.
    - cron: '0 7 * * 1'

permissions:
  contents: read

# Superseded PR pushes cancel the in-flight run; main/cron never cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  audit:
    name: cargo audit
    # Namespace Linux ARM64 runner (arm64-fast — high capacity + NVMe cache).
    # cargo-audit is a Rust tool, so this needs a profile with the Rust
    # toolchain preinstalled; arm64-fast ships cargo, x64-fast does not.
    runs-on: namespace-profile-arm64-fast
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Enforce advisory-ignore review-by date
        # An accepted-risk ignore in .cargo/audit.toml must be timeboxed,
        # not permanent (Codoki review on #481). When active (uncommented)
        # ignores exist, fail if ANY `review-by:` date has passed — or if
        # none is present at all. Robust to both one-per-line and inline
        # `ignore = ["RUSTSEC-..."]` array forms, and to multiple dated
        # ignore blocks. Runs on the weekly cron too, so a stale ignore
        # surfaces without a PR.
        run: |
          f=.cargo/audit.toml
          if [ ! -f "$f" ]; then
            echo "No $f — timebox check skipped."; exit 0
          fi
          # Detect active ignores by stripping TOML line-comments first, so
          # this matches "RUSTSEC-..." whether listed one-per-line or inside
          # an inline array, and never trips on commented-out mentions.
          if ! sed 's/#.*//' "$f" | grep -qE '"RUSTSEC-'; then
            echo "No active advisory ignores — timebox check skipped."; exit 0
          fi
          today="$(date -u +%Y-%m-%d)"
          found=0; stale=0
          while IFS= read -r d; do
            [ -n "$d" ] || continue
            found=1
            if [[ "$today" > "$d" ]]; then
              echo "::error::advisory-ignore review-by date ($d) has passed — re-evaluate $f (see #480): remove any now-fixable advisory, or bump review-by with justification."
              stale=1
            fi
          done < <(grep -oE 'review-by:[[:space:]]*[0-9]{4}-[0-9]{2}-[0-9]{2}' "$f" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
          if [ "$found" -eq 0 ]; then
            echo "::error::$f has active advisory ignores but no 'review-by:' date — every ignore must be timeboxed."; exit 1
          fi
          if [ "$stale" -eq 1 ]; then exit 1; fi
          echo "Advisory ignores valid (today $today) — all review-by dates are in the future."

      - name: Cache cargo (Namespace NVMe cache)
        # Mirror rust.yml: the `rust` mode caches ~/.cargo/{registry,git},
        # target/, and the global cache — deliberately NOT ~/.cargo/bin.
        # cargo is preinstalled in the arm64-fast image at ~/.cargo/bin;
        # mounting a cold cache volume over that dir shadows the toolchain
        # (cargo: command not found), which is exactly what broke this job.
        # cargo-audit therefore recompiles per run, but the cached registry
        # keeps its dependency fetch fast, and audit is low-frequency (manifest
        # changes + weekly cron), so the recompile is a non-issue.
        uses: namespacelabs/nscloud-cache-action@c5f8dab7560444c4bf8dbc64f1b203431873c547  # v1
        with:
          cache: rust

      - name: Install cargo-audit
        # Prebuilt, checksum-verified binary in seconds instead of
        # `cargo install` compiling from source every run (~/.cargo/bin
        # is deliberately never cached — see the cache step above — so
        # the compile used to repeat per run). Version stays pinned
        # (repo pin-everything convention); the advisory database is
        # still fetched fresh each run, so coverage is unchanged. Bump
        # deliberately.
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b  # v2.83.4
        with:
          tool: cargo-audit@0.22.2

      # Cargo.lock is committed (CI Phase 3), so the audit scans the graph
      # that actually builds — no fresh resolution step. Staleness of the
      # lockfile vs the manifests is enforced by rust.yml's --locked lanes
      # on every PR that could desync them.
      - name: cargo audit
        # Non-zero exit on RustSec vulnerabilities fails the gate.
        # Unmaintained-crate warnings (e.g. transitive paste / yaml-rust)
        # are informational and do not fail the build.
        run: cargo audit
