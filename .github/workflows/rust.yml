# Rust CI for slate-core + slate-uniffi.
#
# Three parallel lanes replace the old serial fmt→clippy→test→bench job:
# the PR wall clock is now just the test lane. Measured on the old shape
# (run 29626113718): 24m46s total, of which `cargo test --workspace` was
# 20m52s — 1,193s of that running the slate_core lib binary's ~30
# `census_*` suites at opt-level 0. Tests now run under the `ci` cargo
# profile (opt-level 2 with debug-assertions + overflow-checks still on;
# see Cargo.toml) via cargo-nextest, which also gives per-test timings,
# so census stragglers stay visible in every run's log.
#
# All lanes run on the same Namespace profile and mount its NVMe cache
# volume. Volumes are fork-on-mount / commit-on-clean-exit /
# last-write-wins (namespace.so/docs/architecture/storage/cache-volumes),
# so concurrent lanes are safe: each gets a private fork. The longest
# lane (test) USUALLY commits last, so the big `target/ci` tree stays
# warm run to run; the short lanes may re-do a little work from a stale
# fork — that costs billed seconds off the critical path, not wall time.
# One inversion exists (adversarial review): a COLD bench lane can
# outlast the test lane and commit an older fork, discarding that run's
# freshly warmed target/ci — a one-run penalty that self-heals on the
# next run. The lanes write disjoint profile dirs anyway (lint →
# target/debug check artifacts, test → target/ci, bench →
# target/release); the structural fix, per-lane cache volumes, is a
# deferred dashboard experiment.

name: Rust

on:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'crates/**'
      - '.config/nextest.toml'
      - '.github/workflows/rust.yml'
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'crates/**'
      - '.config/nextest.toml'
      - '.github/workflows/rust.yml'

# Superseded pushes to the same PR cancel the in-flight run (a rapid
# fix-up push shouldn't stack full pipelines). Runs on main never cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: fmt / clippy
    # Namespace Linux runner profile (dashboard-configured; re-pinned to
    # genuine ARM64 by the owner on 2026-07-18 — the name is truthful now).
    runs-on: namespace-profile-arm64-fast
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Assert runner architecture matches the cache lineage
        # The NVMe cache volume is keyed per profile+repo, NOT per
        # architecture. The profile serves genuine ARM64 since the owner's
        # 2026-07-18 dashboard re-pin (it historically served amd64); if
        # the platform field ever flips again, arch-specific rlibs would
        # silently thrash the shared cache on every alternation. Fail
        # loudly instead. On a deliberate re-pin, update the expected
        # value here and expect one cold rebuild.
        run: |
          arch="$(uname -m)"
          if [ "$arch" != "aarch64" ]; then
            echo "::error::runner arch is $arch, cache lineage expects aarch64 — profile platform changed in the dashboard? Update this guard and expect one cold rebuild."
            exit 1
          fi

      - name: Cache Rust build (Namespace NVMe cache)
        uses: namespacelabs/nscloud-cache-action@58bf6e08898e88803c098e2b522668541cd3b2e3  # v1
        with:
          cache: rust

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        # --all-targets covers libs, tests, examples, AND benches — so a
        # bench or test that doesn't type-check fails CI here, in check
        # mode, without paying bench-profile codegen.
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test (nextest, ci profile)
    runs-on: namespace-profile-arm64-fast
    permissions:
      contents: read
    env:
      ROOT_LISTING_PERF_GUARD: session::tests::dir_tree::perf_guard_root_listing_under_100ms_on_10k_files
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Assert runner architecture matches the cache lineage
        # See the lint lane's twin step for the rationale.
        run: |
          arch="$(uname -m)"
          if [ "$arch" != "aarch64" ]; then
            echo "::error::runner arch is $arch, cache lineage expects aarch64 — profile platform changed in the dashboard? Update this guard and expect one cold rebuild."
            exit 1
          fi

      - name: Cache Rust build (Namespace NVMe cache)
        uses: namespacelabs/nscloud-cache-action@58bf6e08898e88803c098e2b522668541cd3b2e3  # v1
        with:
          cache: rust

      - name: Install cargo-nextest
        # Prebuilt, checksum-verified binary in seconds. Installs into
        # $CARGO_HOME/bin at job runtime, so nothing needs caching and
        # the preinstalled toolchain is never shadowed (the reason
        # ~/.cargo/bin is deliberately not part of the cache volume).
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b  # v2.83.4
        with:
          tool: cargo-nextest@0.9.140

      - name: cargo nextest run — censuses (ci profile, tmpfs)
        # The wall-clock perf guard is excluded from both sweep halves and
        # run in isolation below — beside the long dir-tree censuses,
        # scheduler contention is indistinguishable from a
        # list_dir_children regression. If the guard is ever renamed, the
        # isolated step's exact-match filter + --no-tests=fail turns the
        # rename into a loud CI failure, preserving the old
        # `--list | grep` protection.
        #
        # TMPDIR on tmpfs for the CENSUS SUBSET ONLY (adversarial-review
        # fix): censuses assert logical equivalences and spend their time
        # churning tempdir vaults (the dir-tree census alone was 549s on
        # ext4, run 29649179445) — tmpfs drops the journal/flush cost
        # without changing what they assert. Durability and persistence
        # contracts (atomic write + sync_data, crash recovery) run in the
        # NEXT step against the runner's real filesystem, so tmpfs's more
        # forgiving semantics can't mask a regression there.
        env:
          TMPDIR: /dev/shm
        run: >-
          cargo nextest run --workspace --cargo-profile ci --locked
          --no-fail-fast --no-tests=fail
          -E "test(census_) and not test(${ROOT_LISTING_PERF_GUARD})"

      - name: cargo nextest run — non-census suite (ci profile, real fs)
        # Everything that isn't a census (and isn't the isolated guard):
        # unit + integration + the durability/persistence contracts, on
        # the same persistent filesystem real vaults use. Shares the
        # build with the census step, so this adds no compile time; the
        # non-census suite runs in seconds.
        run: >-
          cargo nextest run --workspace --cargo-profile ci --locked
          --no-fail-fast --no-tests=fail
          -E "not test(census_) and not test(${ROOT_LISTING_PERF_GUARD})"

      - name: root-listing performance guard (isolated)
        # Same workspace-level package selection as the sweep above, so
        # feature unification — and therefore the build fingerprint — is
        # identical and nothing recompiles (the old `-p slate-core` form
        # re-unified features and paid a ~26s rebuild here).
        run: >-
          cargo nextest run --workspace --cargo-profile ci --locked
          --no-tests=fail --test-threads 1
          -E "test(=${ROOT_LISTING_PERF_GUARD})"

      - name: Doc-tests
        # nextest doesn't run doctests; keep them via libtest. Edition
        # 2024 merges doctests into one binary, so this is cheap.
        run: cargo test --workspace --doc --profile ci --locked

      - name: Cache footprint report
        # The volume holds target/debug (lint check artifacts), target/ci
        # (this lane), and target/release (bench lane) and resets to
        # EMPTY if content exceeds its 50GB configured size — watch the
        # trend here; prune or grow the volume before hitting the cliff.
        run: du -sh target/* 2>/dev/null | sort -rh || true

  bench-compile:
    name: bench-compile
    runs-on: namespace-profile-arm64-fast
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Assert runner architecture matches the cache lineage
        # See the lint lane's twin step for the rationale.
        run: |
          arch="$(uname -m)"
          if [ "$arch" != "aarch64" ]; then
            echo "::error::runner arch is $arch, cache lineage expects aarch64 — profile platform changed in the dashboard? Update this guard and expect one cold rebuild."
            exit 1
          fi

      - name: Cache Rust build (Namespace NVMe cache)
        uses: namespacelabs/nscloud-cache-action@58bf6e08898e88803c098e2b522668541cd3b2e3  # v1
        with:
          cache: rust

      - name: cargo bench --no-run (PR — LTO off)
        # Compile every bench without running it, so a broken bench
        # binary fails CI loudly. On PRs the thin-LTO knob is disabled
        # via Cargo's documented CARGO_PROFILE_<name>_<key> env override:
        # this is a compile-rot check, not a benchmark, and thin-LTO
        # codegen was ~60% of the old 2m24s step. Local `make bench-check`
        # and real bench runs keep the committed [profile.release] LTO.
        if: github.event_name == 'pull_request'
        env:
          CARGO_PROFILE_BENCH_LTO: 'false'
        run: cargo bench --workspace --no-run --locked

      - name: cargo bench --no-run (main — full profile)
        # On main the full committed profile (thin-LTO) still compiles,
        # so codegen/link-level bench rot is caught within one merge, not
        # left to the next local bench run.
        if: github.event_name == 'push'
        run: cargo bench --workspace --no-run --locked

      - name: Cache footprint report
        # Twin of the test lane's report (adversarial review): under
        # last-write-wins, whichever lane commits LAST defines the next
        # run's volume — so the size trend must be visible from every
        # lane that can win, not just the test lane.
        run: du -sh target/* 2>/dev/null | sort -rh || true
