# Rust CI for slate-core + slate-uniffi.
#
# Mirrors what `make ci` runs locally, plus a bench-compile step so
# benchmark code can't silently rot. Runs on a Namespace Linux ARM64 runner
# (arm64-fast — high capacity): the Rust workspace is platform-independent, so
# Linux is faster + cheaper than the macOS pool, and Namespace's NVMe
# cross-invocation cache keeps cold cargo runs short.

name: Rust

on:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - '.github/workflows/rust.yml'
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - '.github/workflows/rust.yml'

permissions:
  contents: read

jobs:
  rust:
    name: fmt / clippy / test / bench-compile
    # Namespace Linux ARM64 runner (arm64-fast — high capacity + NVMe cache).
    # The Rust workspace is platform-independent, so this needs neither the
    # macOS pin the Swift build uses nor any specific arch.
    runs-on: namespace-profile-arm64-fast
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Cache Rust build (Namespace NVMe cache)
        # Namespace cross-invocation cache — ~/.cargo + target/ on the NVMe
        # volume attached to the arm64-fast profile.
        uses: namespacelabs/nscloud-cache-action@58bf6e08898e88803c098e2b522668541cd3b2e3  # v1
        with:
          cache: rust

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        # --all-targets covers libs, tests, examples, AND benches —
        # so a bench that doesn't compile fails CI here.
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo bench --no-run
        # Compile every bench in the workspace without running them.
        # Full bench execution takes ~15 min and isn't a per-PR
        # concern, but a broken bench binary anywhere in the workspace
        # should fail CI loudly.
        run: cargo bench --workspace --no-run
