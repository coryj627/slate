# Rust CI for slate-core + slate-uniffi.
#
# Mirrors what `make ci` runs locally, plus a bench-compile step so
# benchmark code can't silently rot. Runs on a Namespace Linux runner
# (namespace-profile-default): the Rust workspace is platform-independent,
# so Linux is faster + cheaper than the macOS pool. Caching is GitHub-backed
# for now; swap to Namespace's NVMe cross-invocation cache once Caching is
# enabled on the profile in the Namespace dashboard.

name: Rust

on:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - '.github/workflows/rust.yml'
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - '.github/workflows/rust.yml'

permissions:
  contents: read

jobs:
  rust:
    name: fmt / clippy / test / bench-compile
    # Namespace Linux runner (Ubuntu 22.04, Rust preinstalled). The Rust
    # workspace is platform-independent — audit.yml already resolves it on
    # Linux — so this doesn't need the macOS pin the Swift build uses.
    runs-on: namespace-profile-default
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Cache Rust build
        # GitHub-backed cache (works on the Namespace runner). Swap for
        # namespacelabs/nscloud-cache-action (with: {cache: rust}) once a cache
        # volume is enabled on the namespace-profile-default profile in the
        # Namespace dashboard — that moves the cache onto the NVMe volume.
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        # --all-targets covers libs, tests, examples, AND benches —
        # so a bench that doesn't compile fails CI here.
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo bench --no-run
        # Compile every bench in the workspace without running them.
        # Full bench execution takes ~15 min and isn't a per-PR
        # concern, but a broken bench binary anywhere in the workspace
        # should fail CI loudly.
        run: cargo bench --workspace --no-run
