# SwiftUI accessibility analysis on every PR that touches Swift sources.
#
# Runs cvs-health/ios-swiftui-accessibility-techniques' `a11y-check`
# static analyzer over the Mac app's SwiftUI code. 34 rules across 19
# WCAG 2.2 criteria; the run fails if the score drops below the floor
# defined in MIN_SCORE.
#
# The a11y-check binary is built from a pinned commit and cached so
# subsequent runs skip the (~3 minute) swift build.

name: Accessibility Check

on:
  pull_request:
    paths:
      - 'apps/slate-mac/**/*.swift'
      - '.github/workflows/a11y-check.yml'
  push:
    branches: [main]
    paths:
      - 'apps/slate-mac/**/*.swift'
      - '.github/workflows/a11y-check.yml'

permissions:
  contents: read
  security-events: write   # for SARIF upload
  pull-requests: write     # for the score comment

# Superseded PR pushes cancel the in-flight run; main never cancels.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Pin to a specific cvs-health/ios-swiftui-accessibility-techniques
  # commit. Bump deliberately when you want newer rules; cache key
  # includes this SHA so changing it invalidates the cache.
  A11Y_CHECK_REF: bcaddd56931ce14d32cebcf42ea9f5b08ed5f7d8
  A11Y_PATHS: "apps/slate-mac/Sources/SlateMac"
  # Score floor on the 0–100 a11y-check scale. Must be a non-empty
  # numeric string — the enforcement step validates this and fails
  # loudly on malformed/missing values rather than silently weakening
  # the gate. We're at 100/100 today; treat any drop as a real signal.
  MIN_SCORE: "100"

jobs:
  a11y-check:
    name: SwiftUI Accessibility Check
    # Namespace macOS runner (mac-actions — Apple Silicon, Xcode 26.3 /
    # Swift 6.2.4). Builds the a11y-check tool from source (cached), then runs
    # it over the SwiftUI sources.
    runs-on: namespace-profile-mac-actions
    # actions: read is only needed by codeql-action/upload-sarif within
    # this job; scoping it here keeps the workflow-level grant minimal.
    permissions:
      contents: read
      security-events: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout Slate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Restore cached a11y-check binary
        id: cache-bin
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6
        with:
          path: .a11y-bin
          key: a11y-check-${{ env.A11Y_CHECK_REF }}-${{ runner.os }}-${{ runner.arch }}

      - name: Build a11y-check (cache miss)
        if: steps.cache-bin.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          git clone --filter=blob:none --no-checkout \
            https://github.com/cvs-health/ios-swiftui-accessibility-techniques.git tmp-a11y
          cd tmp-a11y
          git checkout "$A11Y_CHECK_REF"
          cd a11y-check
          swift build -c release
          cd "$GITHUB_WORKSPACE"
          mkdir -p .a11y-bin
          cp tmp-a11y/a11y-check/.build/release/a11y-check .a11y-bin/
          rm -rf tmp-a11y

      - name: Add a11y-check to PATH
        run: echo "$GITHUB_WORKSPACE/.a11y-bin" >> "$GITHUB_PATH"

      - name: Show version
        run: a11y-check --version

      - name: Run a11y-check (human-readable)
        run: a11y-check "$A11Y_PATHS"

      - name: Run a11y-check (JSON for downstream steps)
        if: always()
        run: a11y-check "$A11Y_PATHS" --format json --no-trend > a11y-results.json

      - name: Run a11y-check (SARIF for code scanning)
        if: always()
        run: a11y-check "$A11Y_PATHS" --format sarif --no-trend > a11y-results.sarif

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        # Pinned to SHA for supply-chain hardening; corresponds to
        # github/codeql-action/upload-sarif@v4.35.5. Bump deliberately
        # when picking up new versions.
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba
        with:
          sarif_file: a11y-results.sarif
        continue-on-error: true

      - name: Upload result artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: a11y-results
          path: |
            a11y-results.json
            a11y-results.sarif

      - name: Post score summary on PR
        if: github.event_name == 'pull_request' && !cancelled()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('a11y-results.json', 'utf8'));
            const s = results.score || {};
            const score = (s.score ?? 0).toFixed(1);
            const grade = s.grade || 'F';
            const errors = s.totalErrors ?? 0;
            const warnings = s.totalWarnings ?? 0;
            const min = parseFloat(process.env.MIN_SCORE);
            const passed = parseFloat(score) >= min && errors === 0;
            const emoji = passed ? '✅' : '❌';

            const failed = (s.failedCriteria || [])
              .map(c => `- \`${c.criterion}\` ${c.name} (${c.errors} errors, ${c.warnings} warnings)`)
              .join('\n');
            const failedBlock = failed.length
              ? `### Failed WCAG criteria\n${failed}`
              : '_All WCAG criteria pass._';

            const body = [
              `## ${emoji} Accessibility score: ${score} / 100 (${grade})`,
              ``,
              `**Issues:** ${errors} error(s), ${warnings} warning(s)`,
              `**Minimum required:** ${min}`,
              ``,
              failedBlock,
              ``,
              `---`,
              `Checked by [a11y-check](https://github.com/cvs-health/ios-swiftui-accessibility-techniques) against \`${process.env.A11Y_PATHS}\`.`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const tag = '## ✅ Accessibility score';
            const altTag = '## ❌ Accessibility score';
            const existing = comments.find(c =>
              c.user.type === 'Bot' &&
              (c.body.startsWith(tag) || c.body.startsWith(altTag))
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        # Reporting is best-effort. A GitHub API outage must not suppress or
        # replace the local score-floor result below.
        continue-on-error: true

      - name: Enforce score floor
        if: ${{ !cancelled() }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          MIN_SCORE: ${{ env.MIN_SCORE }}
        with:
          # Parsing in Node sidesteps any "is jq installed on this
          # runner image" question — github-script always has Node.
          script: |
            const fs = require('fs');
            const resultsPath = 'a11y-results.json';
            if (!fs.existsSync(resultsPath)) {
              core.setFailed(
                `${resultsPath} was not produced — a11y-check likely crashed. ` +
                `See the "Run a11y-check (JSON for downstream steps)" step output.`
              );
              return;
            }
            const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
            const s = results.score || {};
            const score = s.score;
            const errors = s.totalErrors;
            if (
              typeof score !== 'number' ||
              !Number.isFinite(score) ||
              score < 0 ||
              score > 100
            ) {
              core.setFailed(
                `a11y-check score must be a finite number from 0 through 100; ` +
                `got ${JSON.stringify(score)}`
              );
              return;
            }
            if (!Number.isInteger(errors) || errors < 0) {
              core.setFailed(
                `a11y-check totalErrors must be a non-negative integer; ` +
                `got ${JSON.stringify(errors)}`
              );
              return;
            }
            // Three things have to be true for the gate to actually
            // enforce: the env var must be set, must be non-empty after
            // trimming, and must parse strictly as a finite number.
            // `Number('')` coerces to 0 and `parseFloat('90%')` returns
            // 90 — both would silently weaken the threshold, so we
            // reject them explicitly.
            const rawMin = (process.env.MIN_SCORE ?? '').trim();
            if (rawMin === '') {
              core.setFailed('MIN_SCORE is unset or empty');
              return;
            }
            const min = Number(rawMin);
            if (!Number.isFinite(min)) {
              core.setFailed(
                `MIN_SCORE must be a number; got ${JSON.stringify(process.env.MIN_SCORE)}`
              );
              return;
            }
            if (min < 0 || min > 100) {
              core.setFailed(`MIN_SCORE must be from 0 through 100; got ${min}`);
              return;
            }
            core.info(`Score: ${score} / Minimum: ${min} / Errors: ${errors}`);
            if (errors > 0) {
              core.setFailed(
                `a11y-check reported ${errors} error(s); see job log and SARIF results`
              );
              return;
            }
            if (score < min) {
              core.setFailed(
                `Accessibility score ${score} is below minimum threshold ${min}`
              );
            }
