# Swift tests for the Mac app.
#
# Runs the SlateMac XCTest target on every PR that touches the app's
# Swift sources or the Rust crates the app links against. The test
# target imports SlateMac which depends on the slate_uniffi dylib, so we
# need cargo build + uniffi-bindgen before `swift test`.

name: Swift Tests

on:
  pull_request:
    paths:
      - 'apps/slate-mac/**'
      - 'crates/slate-uniffi/**'
      - 'crates/slate-core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/swift-tests.yml'
      - 'examples/swift-cli/**'
  push:
    branches: [main]
    paths:
      - 'apps/slate-mac/**'
      - 'crates/slate-uniffi/**'
      - 'crates/slate-core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/swift-tests.yml'
      - 'examples/swift-cli/**'

permissions:
  contents: read

# Superseded PR pushes cancel the in-flight run (macOS runner minutes are
# the expensive pool); runs on main never cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  swift-tests:
    name: Mac app XCTest suite
    # Namespace macOS runner (mac-actions — Apple Silicon, latest Xcode,
    # cargo preinstalled) with NVMe caching. Faster + cheaper than the GitHub
    # macOS pool for the cargo + SwiftPM build. NB: the app's SwiftUI bodies
    # (e.g. MainSplitView) require a current Swift toolchain — Swift 6.2.4
    # specifically regressed the expression type-checker and times out on
    # MainSplitView.body, so this profile must track latest Xcode.
    runs-on: namespace-profile-mac-actions
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Cache Rust + SwiftPM + Xcode (Namespace NVMe cache)
        # Namespace cross-invocation cache. The action unions `cache:` modes
        # with `path:` entries (src/action.ts passes both --mode and --path to
        # spacectl), so these all cache together:
        #   rust     — ~/.cargo + target/ (keeps the slate-uniffi build warm)
        #   swiftpm  — the SwiftPM dependency clones / resolved-package cache
        #   xcode    — the Xcode module/derived-data cache
        # Plus one explicit path for the project-local compiled build products
        # (apps/slate-mac/.build) that no generic mode can know about, so the
        # SwiftPM deps (SwiftDraw, MathJaxSwift, LaTeXSwiftUI, SwiftMath) don't
        # recompile every run.
        uses: namespacelabs/nscloud-cache-action@c5f8dab7560444c4bf8dbc64f1b203431873c547  # v1
        with:
          cache: |
            rust
            swiftpm
            xcode
          path: |
            apps/slate-mac/.build

      - name: Build slate-uniffi + generate Swift bindings + swift build
        # scripts/build-mac-app.sh runs:
        #   cargo build -p slate-uniffi
        #   uniffi-bindgen generate (Swift)
        #   stage bindings into apps/slate-mac/Sources/
        #   swift build inside apps/slate-mac/
        # `--skip-a11y-check` keeps a11y enforcement isolated to the
        # dedicated Accessibility Check workflow; a regression there
        # shouldn't also break this run.
        run: ./scripts/build-mac-app.sh --skip-a11y-check

      - name: Run swift test
        # --parallel: SwiftPM runs XCTest suites SERIALLY by default;
        # this fans test classes across worker processes. Gated on #935's
        # fix — worker processes start without NSApplication.shared, and
        # menu-dispatch tests must establish that precondition themselves
        # (AccessibleDataGridTests.setUp) instead of inheriting it from
        # suite order. Debug-config build products from the build script
        # step are reused; swift test only pays a planning pass.
        run: |
          cd apps/slate-mac
          DYLD_LIBRARY_PATH="$GITHUB_WORKSPACE/target/debug" swift test --parallel

      - name: Build + run swift-cli FFI smoke example
        # The swift-cli example shares the generated VaultError binding; its
        # `describe(_:)` switch is exhaustive, so a new VaultError variant
        # that isn't handled fails to compile. Building it here turns that
        # into a red CI run instead of a silently-rotting example (#390).
        run: make swift-cli
