# THROWAWAY workflow (w0_spec §W0-1 rule 4, #714): keeps the binding-spike
# probe compiling and passing on a GitHub-hosted x64 Windows runner until
# W0-2's permanent windows.yml supersedes it — the spike machine is native
# ARM64, so this lane is also the x64 data point. Delete at W0-2.
#
# Runner choice recorded per rule 4: GitHub-hosted default (no Namespace
# Windows profiles exist as of 2026-07).

name: csharp-probe (W0-1 spike)

on:
  pull_request:
    paths:
      - 'examples/csharp-probe/**'
      - 'crates/slate-uniffi/**'
      - '.github/workflows/csharp-probe.yml'
  push:
    branches: [main]
    paths:
      - 'examples/csharp-probe/**'
      - 'crates/slate-uniffi/**'
      - '.github/workflows/csharp-probe.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  probe:
    name: probe (windows x64)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # rust-toolchain.toml pins 1.95.0; rustup materializes it (plus the
      # x86_64-pc-windows-msvc host target) on the first cargo call.

      - name: Cache cargo registry + targets
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            target
            examples/csharp-probe/shim/target
          key: csharp-probe-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'examples/csharp-probe/shim/Cargo.lock', 'rust-toolchain.toml') }}

      - name: Cache uniffi-bindgen-cs
        id: bindgen-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cargo/bin/uniffi-bindgen-cs.exe
          key: uniffi-bindgen-cs-v0.11.0+v0.31.0-${{ runner.os }}-x64

      - name: Install uniffi-bindgen-cs
        if: steps.bindgen-cache.outputs.cache-hit != 'true'
        # Tag v0.11.0+v0.31.0 targets exactly the workspace's uniffi 0.31
        # (the rule-2a version-compat premise; a forced mismatch here is
        # itself a spike finding).
        run: cargo install --git https://github.com/NordSecurity/uniffi-bindgen-cs --tag v0.11.0+v0.31.0 uniffi-bindgen-cs --locked

      - name: Set up .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1  # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Generate bindings (both candidates)
        run: ./examples/csharp-probe/generate.ps1 -Locked

      - name: Run probe (uniffi-bindgen-cs candidate)
        run: dotnet run --project examples/csharp-probe/SlateProbe.csproj

      - name: Run probe (csbindgen shim counter-candidate)
        run: dotnet run --project examples/csharp-probe/ShimProbe/ShimProbe.csproj
