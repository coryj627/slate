# License-header guard.
#
# Fails any PR that introduces a tracked .rs or .swift file without an
# `SPDX-License-Identifier` line in its first 20 lines. The fixer is
# `scripts/apply-license-header.py` — idempotent, safe to re-run. See
# issue #266 for the rationale and the chosen header format.

name: License headers

on:
  pull_request:
    paths:
      - '**/*.rs'
      - '**/*.swift'
      - '**/*.cs'
      - 'scripts/check-license-headers.sh'
      - 'scripts/apply-license-header.py'
      - '.github/workflows/license-headers.yml'
  push:
    branches: [main]
    paths:
      - '**/*.rs'
      - '**/*.swift'
      - '**/*.cs'
      - 'scripts/check-license-headers.sh'
      - 'scripts/apply-license-header.py'
      - '.github/workflows/license-headers.yml'

permissions:
  contents: read

# Superseded PR pushes cancel the in-flight run; main never cancels.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: SPDX header present on every .rs/.swift
    # Namespace Linux x64 runner — no toolchain needed, just bash + grep + git.
    runs-on: namespace-profile-x64-fast
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Run check
        run: ./scripts/check-license-headers.sh
