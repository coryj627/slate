# Windows frontend CI (w0_spec §W0-2 item 3, #603): path-filtered so a
# Windows PR doesn't block on mac checks and vice versa (the per-area
# pattern of a11y-check.yml / swift-tests.yml). Builds core (x64 host +
# ARM64 cross-compile check), generates the C# bindings, builds the app,
# runs the xUnit suite, and enforces the program's `dotnet format`
# pre-push promise as a gate.
#
# Runner selection recorded per §W0-2 item 3: GitHub-hosted default (no
# Namespace Windows profiles exist as of 2026-07).

name: windows

on:
  pull_request:
    paths:
      - 'apps/slate-windows/**'
      - 'crates/**'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/windows.yml'
  push:
    branches: [main]
    paths:
      - 'apps/slate-windows/**'
      - 'crates/**'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/windows.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  windows:
    name: build + test (windows x64)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      # rust-toolchain.toml pins 1.95.0; rustup materializes it (plus the
      # x86_64-pc-windows-msvc host target) on the first cargo call.

      - name: Cache cargo registry + targets
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6
        with:
          path: |
            ~/.cargo/registry
            target
          key: windows-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}

      - name: Cache uniffi-bindgen-cs
        id: bindgen-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6
        with:
          path: ~/.cargo/bin/uniffi-bindgen-cs.exe
          key: uniffi-bindgen-cs-v0.11.0+v0.31.0-${{ runner.os }}-x64

      - name: Install uniffi-bindgen-cs
        if: steps.bindgen-cache.outputs.cache-hit != 'true'
        # Tag pinned to the workspace's uniffi minor (w0_spec §Decision
        # consequences: upgraded in lockstep with the uniffi dependency).
        run: cargo install --git https://github.com/NordSecurity/uniffi-bindgen-cs --tag v0.11.0+v0.31.0 uniffi-bindgen-cs --locked

      - name: Set up .NET 10
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: ARM64 cross-compile check (slate-uniffi)
        run: |
          rustup target add aarch64-pc-windows-msvc
          cargo check -p slate-uniffi --target aarch64-pc-windows-msvc --locked

      # Windows is the load-bearing witness for MoveFileExW no-clobber,
      # reserved-name validation, case-insensitive identity, long paths, and
      # every other platform-sensitive core contract. Run the complete package
      # suite except the intentionally long randomized censuses and the
      # hardware-timing guard (both remain covered by the Rust lanes).
      - name: slate-core non-census test suite
        run: >-
          cargo test -p slate-core --locked
          -- --skip census_
          --skip perf_guard_root_listing_under_100ms_on_10k_files

      # Program decision 19 / w0_spec §W0-3 item 3: the CLI builds and its
      # suite runs on the Windows runner — the full extent of Windows CLI
      # scope (distribution reserved as W-E5).
      - name: slate-cli test suite
        run: cargo test -p slate-cli --locked

      - name: Generate C# bindings (builds slate_uniffi x64 cdylib)
        run: ./apps/slate-windows/generate-bindings.ps1 -Locked

      - name: Build
        run: dotnet build apps/slate-windows/SlateWindows.slnx --configuration Release

      - name: Test
        run: dotnet test apps/slate-windows/tests/SlateWindows.Tests/SlateWindows.Tests.csproj --configuration Release --no-build

      # W1-1 / §W-C: launch the real Fluent-styled WinExe, drive its shell
      # through UIA3, and run the axe-windows rule set against the live tree.
      # Keep this process-owning gate separate from the in-process censuses so
      # the two test hosts cannot race for Slate's single-instance identity.
      - name: Shell accessibility gate (FlaUI + axe-windows)
        run: >-
          dotnet test
          apps/slate-windows/tests/SlateWindows.AccessibilityTests/SlateWindows.AccessibilityTests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=slate-windows-accessibility.trx"
          --results-directory "${{ runner.temp }}\slate-accessibility-results"
        env:
          SLATE_REQUIRE_UI_AUTOMATION: '1'
          SLATE_ACCESSIBILITY_EVIDENCE_DIR: '${{ runner.temp }}\slate-accessibility-evidence'

      # Keep both the runner result and the per-surface axe summaries. This
      # runs after a failing gate as well so an accessibility regression leaves
      # actionable evidence instead of only an ephemeral console transcript.
      - name: Upload shell accessibility evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: slate-windows-accessibility-${{ github.sha }}
          path: |
            ${{ runner.temp }}\slate-accessibility-results\**\*
            ${{ runner.temp }}\slate-accessibility-evidence\**\*
          if-no-files-found: warn
          retention-days: 30

      - name: Format gate (dotnet format --verify-no-changes)
        run: dotnet format apps/slate-windows/SlateWindows.slnx --verify-no-changes
