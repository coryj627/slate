# Windows frontend CI (w0_spec §W0-2 item 3, #603): path-filtered so a
# Windows PR doesn't block on mac checks and vice versa (the per-area
# pattern of a11y-check.yml / swift-tests.yml). Builds core (x64 host +
# ARM64 cross-compile check), generates the C# bindings, builds the app,
# runs the xUnit suite, and enforces the program's `dotnet format`
# pre-push promise as a gate.
#
# Runner selection recorded per §W0-2 item 3: GitHub-hosted default (no
# Namespace Windows profiles exist as of 2026-07).

name: windows

on:
  pull_request:
    paths:
      - 'apps/slate-windows/**'
      - 'crates/**'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/windows.yml'
  push:
    branches: [main]
    paths:
      - 'apps/slate-windows/**'
      - 'crates/**'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/windows.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  windows:
    name: build + test (windows x64)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # rust-toolchain.toml pins 1.95.0; rustup materializes it (plus the
      # x86_64-pc-windows-msvc host target) on the first cargo call.

      - name: Cache cargo registry + targets
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            target
          key: windows-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}

      - name: Cache uniffi-bindgen-cs
        id: bindgen-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cargo/bin/uniffi-bindgen-cs.exe
          key: uniffi-bindgen-cs-v0.11.0+v0.31.0-${{ runner.os }}-x64

      - name: Install uniffi-bindgen-cs
        if: steps.bindgen-cache.outputs.cache-hit != 'true'
        # Tag pinned to the workspace's uniffi minor (w0_spec §Decision
        # consequences: upgraded in lockstep with the uniffi dependency).
        run: cargo install --git https://github.com/NordSecurity/uniffi-bindgen-cs --tag v0.11.0+v0.31.0 uniffi-bindgen-cs --locked

      - name: Set up .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1  # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: ARM64 cross-compile check (slate-uniffi)
        run: |
          rustup target add aarch64-pc-windows-msvc
          cargo check -p slate-uniffi --target aarch64-pc-windows-msvc --locked

      - name: Generate C# bindings (builds slate_uniffi x64 cdylib)
        run: ./apps/slate-windows/generate-bindings.ps1 -Locked

      - name: Build
        run: dotnet build apps/slate-windows/SlateWindows.slnx

      - name: Test
        run: dotnet test apps/slate-windows/SlateWindows.slnx --no-build

      - name: Format gate (dotnet format --verify-no-changes)
        run: dotnet format apps/slate-windows/SlateWindows.slnx --verify-no-changes
