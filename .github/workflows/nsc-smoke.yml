name: NSC smoke
on:
  push:
    branches: [chore/namespace-ci]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  macos-probe:
    runs-on: namespace-profile-macos
    steps:
      - run: |
          echo "uname: $(uname -a)"
          echo "xcode: $(xcodebuild -version 2>/dev/null | head -1 || echo none)"
          echo "namespace macOS runner reached ✓"
