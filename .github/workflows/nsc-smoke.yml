name: NSC smoke
on:
  push:
    branches: [chore/namespace-ci]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  toolchain-probe:
    runs-on: namespace-profile-default
    steps:
      - run: |
          echo "cargo:  $(cargo --version 2>/dev/null || echo MISSING)"
          echo "rustc:  $(rustc --version 2>/dev/null || echo MISSING)"
          echo "rustup: $(rustup --version 2>/dev/null || echo MISSING)"
          echo "git:    $(git --version 2>/dev/null || echo MISSING)"
          echo "gh:     $(gh --version 2>/dev/null | head -1 || echo MISSING)"
          echo "node:   $(node --version 2>/dev/null || echo MISSING)"
          echo "os:     $(cat /etc/os-release 2>/dev/null | grep PRETTY | cut -d= -f2)"
          echo "nproc:  $(nproc)  mem: $(free -h | awk '/Mem:/{print $2}')"
